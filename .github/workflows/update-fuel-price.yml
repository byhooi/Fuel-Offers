name: Update fuel price

on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Fetch Shenzhen 95 fuel price
        env:
          FUEL_PRICE_SOURCE_URL: ${{ vars.FUEL_PRICE_SOURCE_URL }}
          FUEL_PRICE_SOURCE_NAME: ${{ vars.FUEL_PRICE_SOURCE_NAME }}
        run: node scripts/update-fuel-price.mjs

      - name: Fetch Yueyang 92 rental fuel price
        if: ${{ !cancelled() }}
        env:
          RENTAL_FUEL_PRICE_SOURCE_URL: ${{ vars.RENTAL_FUEL_PRICE_SOURCE_URL }}
          RENTAL_FUEL_PRICE_SOURCE_NAME: ${{ vars.RENTAL_FUEL_PRICE_SOURCE_NAME }}
        run: node scripts/update-rental-fuel-price.mjs

      - name: Commit updated price
        if: ${{ !cancelled() }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update fuel prices"
          file_pattern: fuel-price.json rental-fuel-price.json
