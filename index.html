<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>深圳 95 号汽油优惠计算器</title>
  <meta name="description" content="自动读取深圳 95 号汽油今日油价，按每升优惠金额换算优惠前后油费。">
  <style>
    :root {
      --bg: #f4f0e8;
      --ink: #19201d;
      --muted: #5d665f;
      --line: #d8d0c2;
      --panel: #fffaf0;
      --panel-strong: #fcf2dc;
      --green: #16724f;
      --green-deep: #0f4e39;
      --amber: #e3a322;
      --red: #c4442d;
      --shadow: 0 18px 50px rgba(32, 38, 33, .13);
      font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(227, 163, 34, .18), transparent 26rem),
        linear-gradient(135deg, rgba(22, 114, 79, .08), transparent 42%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: 24px;
      align-items: stretch;
      min-height: 320px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 5vw, 56px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(120deg, rgba(255, 250, 240, .96), rgba(255, 250, 240, .72)),
        repeating-linear-gradient(90deg, rgba(25, 32, 29, .04) 0 1px, transparent 1px 18px);
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -90px;
      bottom: -120px;
      width: 360px;
      height: 360px;
      border: 34px solid rgba(22, 114, 79, .16);
      border-radius: 50%;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--green-deep);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .kicker::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 16px 0 0 var(--green);
    }

    h1 {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0;
      font-size: clamp(36px, 7vw, 72px);
      line-height: .96;
      letter-spacing: 0;
    }

    .hero p {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .price-board {
      display: grid;
      align-content: space-between;
      min-height: 100%;
      padding: 28px;
      border: 1px solid rgba(15, 78, 57, .24);
      border-radius: 8px;
      background: linear-gradient(180deg, #143b2e, #0f2e24);
      color: #fffaf0;
      box-shadow: var(--shadow);
    }

    .price-label {
      color: rgba(255, 250, 240, .72);
      font-size: 15px;
    }

    .price-value {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 14px;
    }

    .price-value strong {
      font-size: clamp(52px, 8vw, 82px);
      line-height: .9;
      letter-spacing: 0;
    }

    .price-value span {
      color: rgba(255, 250, 240, .78);
      font-size: 18px;
    }

    .source {
      display: grid;
      gap: 8px;
      margin-top: 26px;
      color: rgba(255, 250, 240, .76);
      font-size: 14px;
      line-height: 1.5;
    }

    .source a {
      color: #ffe0a1;
    }

    main {
      display: grid;
      grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 240, .88);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 0;
    }

    .panel h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 24px;
    }

    .field {
      display: grid;
      gap: 9px;
      margin-bottom: 18px;
    }

    .field label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      min-height: 54px;
      border: 1px solid #cbbfaa;
      border-radius: 8px;
      background: #fffdf8;
      overflow: hidden;
    }

    .input-wrap input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      padding: 14px 16px;
      background: transparent;
      color: var(--ink);
      font-size: 22px;
    }

    .unit {
      flex: 0 0 auto;
      padding: 0 15px;
      color: var(--muted);
      border-left: 1px solid #e3dacb;
      font-size: 14px;
      white-space: nowrap;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      border-radius: 8px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
    }

    .segmented button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: .16s ease;
    }

    .segmented button.active {
      background: var(--green);
      color: #fffaf0;
      box-shadow: 0 8px 20px rgba(22, 114, 79, .22);
    }

    .result-panel {
      overflow: hidden;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
    }

    .metric {
      min-height: 150px;
      padding: 24px;
      background: rgba(255, 250, 240, .95);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .metric strong {
      display: block;
      margin-top: 18px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .metric small {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .notice {
      margin-top: 18px;
      padding: 14px 16px;
      border-left: 4px solid var(--amber);
      background: rgba(227, 163, 34, .12);
      color: #5d4a19;
      line-height: 1.7;
      border-radius: 0 8px 8px 0;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid #cbbfaa;
      border-radius: 8px;
      background: #fffdf8;
      color: var(--green-deep);
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease;
    }

    .icon-button:hover {
      transform: translateY(-1px);
      border-color: var(--green);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      color: var(--green-deep);
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .status-pill.error {
      color: var(--red);
    }

    .status-pill.error .status-dot {
      background: var(--red);
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .masthead,
      main {
        grid-template-columns: 1fr;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 120px;
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 20px, 1120px);
        padding: 10px 0 18px;
      }

      .hero,
      .price-board,
      .panel-body,
      .metric {
        padding: 20px;
      }

      .panel-header {
        padding: 20px 20px 0;
        align-items: flex-start;
      }

      .segmented {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="masthead">
      <div class="hero">
        <div class="kicker">深圳 95 号汽油</div>
        <h1>油价优惠换算台</h1>
        <p>读取今日基础油价，设置每升优惠金额后，快速在优惠前油费和实际支付油费之间互相推算。</p>
      </div>

      <aside class="price-board" aria-live="polite">
        <div>
          <div class="price-label">今日挂牌价</div>
          <div class="price-value">
            <strong id="todayPrice">--</strong>
            <span>元/升</span>
          </div>
        </div>
        <div class="source">
          <span id="priceMeta">正在读取 fuel-price.json</span>
          <span id="sourceLink"></span>
        </div>
      </aside>
    </section>

    <main>
      <section class="panel">
        <div class="panel-header">
          <h2>优惠设置</h2>
          <span class="status-pill" id="statusPill"><i class="status-dot"></i><span>可计算</span></span>
        </div>
        <div class="panel-body">
          <div class="field">
            <label for="basePrice">95 号汽油挂牌价</label>
            <div class="input-wrap">
              <input id="basePrice" type="number" min="0" step="0.01" inputmode="decimal" value="8.30">
              <span class="unit">元/升</span>
            </div>
          </div>

          <div class="field">
            <label for="discount">每升优惠</label>
            <div class="input-wrap">
              <input id="discount" type="number" min="0" step="0.01" inputmode="decimal" value="0.40">
              <span class="unit">元/升</span>
            </div>
          </div>

          <div class="field">
            <label>换算方向</label>
            <div class="segmented" role="tablist" aria-label="换算方向">
              <button type="button" class="active" data-mode="before-to-after">优惠前 → 实付</button>
              <button type="button" data-mode="after-to-before">实付 → 优惠前</button>
            </div>
          </div>

          <div class="field">
            <label for="amount" id="amountLabel">优惠前油费</label>
            <div class="input-wrap">
              <input id="amount" type="number" min="0" step="0.01" inputmode="decimal" value="300">
              <span class="unit">元</span>
            </div>
          </div>

          <div class="actions">
            <button class="icon-button" id="swapMode" title="切换换算方向" aria-label="切换换算方向">
              <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7 7h11l-3-3m3 3-3 3M17 17H6l3 3m-3-3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="icon-button" id="resetDefaults" title="恢复默认优惠" aria-label="恢复默认优惠">
              <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="notice" id="notice">优惠后单价会自动按“挂牌价 - 每升优惠”计算。</div>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="panel-header">
          <h2>换算结果</h2>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>优惠后单价</label>
            <div class="input-wrap" aria-live="polite">
              <input id="discountedPrice" type="text" readonly value="--">
              <span class="unit">元/升</span>
            </div>
          </div>
        </div>

        <div class="result-grid" aria-live="polite">
          <div class="metric">
            <span id="primaryLabel">实付油费</span>
            <strong id="primaryResult">--</strong>
            <small id="primaryHint">按优惠后单价估算</small>
          </div>
          <div class="metric">
            <span>节省金额</span>
            <strong id="savingResult">--</strong>
            <small>同一升数下的价差</small>
          </div>
          <div class="metric">
            <span>约加油量</span>
            <strong id="litersResult">--</strong>
            <small>由输入金额反推</small>
          </div>
        </div>
      </section>
    </main>

    <footer>
      油价数据来自仓库中的 fuel-price.json；GitHub Actions 可按计划更新。页面计算只作为优惠换算参考，实际以加油站结算和支付渠道规则为准。
    </footer>
  </div>

  <script>
    const state = {
      mode: localStorage.getItem("fuel-mode") || "before-to-after",
      defaultDiscount: 0.4
    };

    const els = {
      todayPrice: document.querySelector("#todayPrice"),
      priceMeta: document.querySelector("#priceMeta"),
      sourceLink: document.querySelector("#sourceLink"),
      basePrice: document.querySelector("#basePrice"),
      discount: document.querySelector("#discount"),
      amount: document.querySelector("#amount"),
      amountLabel: document.querySelector("#amountLabel"),
      discountedPrice: document.querySelector("#discountedPrice"),
      primaryLabel: document.querySelector("#primaryLabel"),
      primaryResult: document.querySelector("#primaryResult"),
      primaryHint: document.querySelector("#primaryHint"),
      savingResult: document.querySelector("#savingResult"),
      litersResult: document.querySelector("#litersResult"),
      notice: document.querySelector("#notice"),
      statusPill: document.querySelector("#statusPill"),
      swapMode: document.querySelector("#swapMode"),
      resetDefaults: document.querySelector("#resetDefaults"),
      modeButtons: [...document.querySelectorAll("[data-mode]")]
    };

    function numberValue(input) {
      const value = Number.parseFloat(input.value);
      return Number.isFinite(value) ? value : 0;
    }

    function money(value) {
      return Number.isFinite(value) ? `¥${value.toFixed(2)}` : "--";
    }

    function price(value) {
      return Number.isFinite(value) ? value.toFixed(2) : "--";
    }

    function liters(value) {
      return Number.isFinite(value) ? `${value.toFixed(2)} L` : "--";
    }

    function setStatus(ok, text) {
      els.statusPill.classList.toggle("error", !ok);
      els.statusPill.querySelector("span:last-child").textContent = text;
    }

    function setMode(mode) {
      state.mode = mode;
      localStorage.setItem("fuel-mode", mode);
      els.modeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
      els.amountLabel.textContent = mode === "before-to-after" ? "优惠前油费" : "实付油费";
      calculate();
    }

    function calculate() {
      const basePrice = numberValue(els.basePrice);
      const discount = numberValue(els.discount);
      const inputAmount = numberValue(els.amount);
      const discounted = basePrice - discount;

      els.discountedPrice.value = discounted > 0 ? price(discounted) : "--";
      localStorage.setItem("fuel-discount", String(discount));
      localStorage.setItem("fuel-base-price", String(basePrice));

      if (basePrice <= 0 || discounted <= 0) {
        setStatus(false, "请检查单价");
        els.primaryResult.textContent = "--";
        els.savingResult.textContent = "--";
        els.litersResult.textContent = "--";
        els.notice.textContent = "挂牌价必须大于 0，且每升优惠不能大于或等于挂牌价。";
        return;
      }

      if (inputAmount < 0) {
        setStatus(false, "金额无效");
        return;
      }

      setStatus(true, "可计算");

      let resultAmount;
      let fuelLiters;
      let saving;

      if (state.mode === "before-to-after") {
        fuelLiters = inputAmount / basePrice;
        resultAmount = fuelLiters * discounted;
        saving = inputAmount - resultAmount;
        els.primaryLabel.textContent = "实付油费";
        els.primaryHint.textContent = `优惠前 ${money(inputAmount)} 可加约 ${liters(fuelLiters)}`;
      } else {
        fuelLiters = inputAmount / discounted;
        resultAmount = fuelLiters * basePrice;
        saving = resultAmount - inputAmount;
        els.primaryLabel.textContent = "优惠前油费";
        els.primaryHint.textContent = `实付 ${money(inputAmount)} 可加约 ${liters(fuelLiters)}`;
      }

      els.primaryResult.textContent = money(resultAmount);
      els.savingResult.textContent = money(Math.max(0, saving));
      els.litersResult.textContent = liters(fuelLiters);
      els.notice.textContent = `当前按 ${price(basePrice)} 元/升挂牌价、每升优惠 ${price(discount)} 元计算。`;
    }

    async function loadFuelPrice() {
      const savedDiscount = Number.parseFloat(localStorage.getItem("fuel-discount"));
      const savedBasePrice = Number.parseFloat(localStorage.getItem("fuel-base-price"));
      if (Number.isFinite(savedDiscount)) {
        els.discount.value = savedDiscount.toFixed(2);
      }
      if (Number.isFinite(savedBasePrice)) {
        els.basePrice.value = savedBasePrice.toFixed(2);
      }

      try {
        const response = await fetch("fuel-price.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const currentPrice = Number(data.price);

        if (Number.isFinite(currentPrice) && currentPrice > 0) {
          els.todayPrice.textContent = price(currentPrice);
          els.basePrice.value = price(currentPrice);
          els.priceMeta.textContent = `${data.city || "深圳"} · ${data.fuel || "95号汽油"} · 更新于 ${formatDate(data.updatedAt)}`;
          els.sourceLink.innerHTML = data.sourceUrl
            ? `<a href="${data.sourceUrl}" target="_blank" rel="noreferrer">查看数据来源</a>`
            : data.source || "本地数据";
        } else {
          throw new Error("fuel-price.json 未提供有效价格");
        }
      } catch (error) {
        els.todayPrice.textContent = price(numberValue(els.basePrice));
        els.priceMeta.textContent = "未能读取自动油价，当前使用手动输入值";
        els.sourceLink.textContent = error.message;
      } finally {
        setMode(state.mode);
      }
    }

    function formatDate(value) {
      if (!value) return "未知时间";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });
    els.swapMode.addEventListener("click", () => {
      setMode(state.mode === "before-to-after" ? "after-to-before" : "before-to-after");
    });
    els.resetDefaults.addEventListener("click", () => {
      els.discount.value = state.defaultDiscount.toFixed(2);
      calculate();
    });
    [els.basePrice, els.discount, els.amount].forEach((input) => {
      input.addEventListener("input", calculate);
    });

    loadFuelPrice();
  </script>
</body>
</html>
